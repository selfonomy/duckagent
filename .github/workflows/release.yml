name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create or update, for example v0.1.0"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-15
            archive: tar.gz
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            archive: tar.gz
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-24.04
            archive: tar.gz
          - target: aarch64-pc-windows-msvc
            runner: windows-2025
            archive: zip
          - target: x86_64-pc-windows-msvc
            runner: windows-2025
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap libcap-dev musl-tools pkg-config

      - name: Install Rust toolchain
        run: rustup show

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build Linux release binary
        if: runner.os == 'Linux'
        env:
          DUCKAGENT_SKIP_VENDORED_BWRAP: "1"
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Build release binary
        if: runner.os != 'Linux'
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package Unix archive
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          asset="duck-${{ matrix.target }}.tar.gz"
          mkdir -p package
          cp "target/${{ matrix.target }}/release/duck" package/duck
          chmod 0755 package/duck
          tar -C package -czf "$asset" duck
          shasum -a 256 "$asset" > "$asset.sha256"

      - name: Package Windows archive
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $asset = "duck-${{ matrix.target }}.zip"
          New-Item -ItemType Directory -Force -Path package | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\duck.exe" "package\duck.exe"
          Compress-Archive -Path "package\duck.exe" -DestinationPath $asset -Force
          $hash = (Get-FileHash -LiteralPath $asset -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $asset" | Set-Content -LiteralPath "$asset.sha256" -Encoding ascii

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: duck-${{ matrix.target }}
          path: |
            duck-${{ matrix.target }}.${{ matrix.archive }}
            duck-${{ matrix.target }}.${{ matrix.archive }}.sha256

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Download archives
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create or update release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="$DISPATCH_TAG"
          fi

          mapfile -t files < <(find artifacts -type f | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release files found." >&2
            exit 1
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${files[@]}" --clobber
          else
            gh release create "$tag" "${files[@]}" --title "$tag" --generate-notes
          fi
